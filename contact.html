<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Contact Form</title>
</head>

<body>

    <h1>Contact Us</h1>

    <form>
        <!-- Full name input -->
        <label for="full-name">Full Name:</label>
        <input type="text" id="full-name" name="fullName" required>

        <br><br>

        <!-- Email input -->
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <br><br>

        <!-- Topic dropdown -->
        <label for="topic">Topic:</label>
        <select id="topic" name="topic">
            <option value="">Choose a topic</option>
            <option value="general">General Question</option>
            <option value="support">Technical Support</option>
            <option value="feedback">Feedback</option>
        </select>

        <br><br>

        <!-- Preferred contact method radio buttons -->
        <p>Preferred Contact Method:</p>

        <label for="contact-email">Email</label>
        <input type="radio" id="contact-email" name="contactMethod" value="email">

        <label for="contact-phone">Phone</label>
        <input type="radio" id="contact-phone" name="contactMethod" value="phone">

        <br><br>

        <!-- Checkboxes -->
        <p>Please select any options that apply:</p>
        
        <label for="newsletter">Send me the newsletter</label>
        <input type="checkbox" id="newsletter" name="newsletter">

        <br>

        <label for="updates">Send me product updates</label>
        <input type="checkbox" id="updates" name="updates">

        <br><br>

        <!-- Message textarea -->
        <label for="message">Message:</label>
        <br>
        <textarea id="message" name="message" rows="6" cols="40"></textarea>

        <br><br>

        <!-- Submit button -->
        <button type="submit">Submit</button>
    </form>

</body>
</html>
